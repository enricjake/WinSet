name: CI & Release

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual version tag (e.g., 0.0.5). If empty, extracts from src/version.py'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  test:
    name: Run Unit Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest tests/

  release:

    name: Build & Release Artifacts
    # Run on push to main OR manual dispatch
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Extract Version
        id: get_version
        shell: pwsh
        run: |
          $input_version = "${{ github.event.inputs.version }}"
          if ($input_version -ne "") {
              $version = $input_version
              Write-Host "Using manual version: $version"
          } else {
              $version = python -c "from src.version import VERSION; print(VERSION)"
              Write-Host "Extracted version from code: $version"
          }
          # Ensure version starts with 'v' for the tag if it doesn't already
          if (-not $version.StartsWith("v")) { $tag = "v$version" } else { $tag = $version }
          echo "VERSION=$tag" >> $env:GITHUB_OUTPUT
          echo "Final Tag: $tag"

      - name: Build Standalone EXE
        run: |
          python scripts/build_exe.py

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: true
          prerelease: true
          files: dist/WinSet.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
